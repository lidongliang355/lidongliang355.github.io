<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LI DONGLIANG | BRAND DIRECTOR</title>
    
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <link rel="icon" href="favicon.png" type="image/png">
    
    <style>
        /* 1. 基础容器：彻底裁切溢出部分 */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background-color: #000; 
            /* 使用系统级衬线体，营造时尚感 */
            font-family: "Optima", "Georgia", "Times New Roman", serif;
        }

        /* 2. 核心遮挡逻辑：让窗口比屏幕大，并向下偏移，把底部标挤走 */
        #content-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* 关键：剪裁掉多余部分 */
        }

        iframe { 
            width: 100%; 
            /* 让网页高度多出 60 像素 */
            height: calc(100% + 60px); 
            border: none; 
            position: absolute;
            top: 0;
            left: 0;
            /* 向下推一点点，确保底部标彻底消失 */
            margin-top: -5px; 
            z-index: 1;
        }

        /* 3. 时尚开屏动画 */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            /* 离场动画：先慢后快的抽离感 */
            animation: curtainUp 1.4s cubic-bezier(0.8, 0, 0.2, 1) 3s forwards;
        }

        #splash-text {
            color: #fff;
            font-size: 14px; /* 小字号更显高级 */
            font-weight: 300;
            letter-spacing: 0.8em; /* 极宽字间距 */
            text-transform: uppercase;
            opacity: 0;
            filter: blur(10px); /* 初始模糊 */
            
            /* 文字显现动画：模糊变清晰 */
            animation: blurReveal 2s cubic-bezier(0.2, 0, 0.2, 1) 0.5s forwards;
        }

        .line {
            width: 40px;
            height: 1px;
            background: rgba(255,255,255,0.3);
            margin-top: 20px;
            transform: scaleX(0);
            animation: lineGrow 1.5s ease 1s forwards;
        }

        /* --- 动画关键帧 --- */

        /* 文字从模糊到清晰 */
        @keyframes blurReveal {
            0% { opacity: 0; filter: blur(10px); transform: scale(0.95); }
            100% { opacity: 1; filter: blur(0); transform: scale(1); }
        }

        /* 装饰线拉伸 */
        @keyframes lineGrow {
            to { transform: scaleX(1); }
        }

        /* 幕布向上滑出 */
        @keyframes curtainUp {
            0% { transform: translateY(0); }
            100% { transform: translateY(-100%); visibility: hidden; }
        }

    </style>
</head>
<body>
    
    <div id="splash-screen">
        <div id="splash-text">LI DONGLIANG PORTFOLIO</div>
        <div class="line"></div>
    </div>

    <div id="content-wrapper">
        <iframe src="https://lidongliang.framer.website/"></iframe>
    </div>

</body>
</html>
