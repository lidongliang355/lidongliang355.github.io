<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>李东亮 | Brand Manager & Designer</title>
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <link rel="icon" href="favicon.png" type="image/png">
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background-color: #000; 
        }
        /* 这里的原理是：让窗户比屏幕高一点点，把底部的标挤走 */
        .container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        iframe { 
            width: 100%; 
            height: calc(100% + 50px); /* 让高度多出50像素 */
            border: none;
            margin-bottom: -50px; /* 把多出的部分藏在下面 */
        }
    </style>
</head>
<body>
    <div class="container">
        <iframe src="https://lidongliang.framer.website/"></iframe>
    </div>
</body>
</html>
