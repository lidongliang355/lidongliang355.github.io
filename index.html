<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LI DONGLIANG | BRAND DIRECTOR</title>
    
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <link rel="icon" href="favicon.png" type="image/png">
    
    <style>
        /* 基础样式：确保全屏且无边距 */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background-color: #000; 
        }

        /* 包装容器：负责裁掉 Framer 的底部 Logo */
        #content-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* 针对移动端滑动的优化 */
            -webkit-overflow-scrolling: touch;
        }

        iframe { 
            width: 100%; 
            /* 让网页高度多出 60 像素，将其挤出视野 */
            height: calc(100% + 60px); 
            border: none; 
            position: absolute;
            top: 0;
            left: 0;
            /* 向上微调，确保顶部对齐 */
            margin-top: 0; 
        }
    </style>
</head>
<body>

    <div id="content-wrapper">
        <iframe src="https://lidongliang.framer.website/"></iframe>
    </div>

</body>
</html>
